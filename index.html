<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#173f31">
<link rel="manifest" href="./manifest.json">
<title>IPQC Smart Factory V2.1</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC",sans-serif;background:#f3f6f5;color:#183028}
button,input,select,textarea{font:inherit}.hidden{display:none!important}.wrap{max-width:1050px;margin:auto;padding:15px}
header{position:sticky;top:0;z-index:20;background:#173f31;color:#fff;padding:14px}.head{max-width:1050px;margin:auto;display:flex;justify-content:space-between;gap:12px;align-items:center}
.brand{font-weight:900;font-size:19px}.badge{font-size:11px;background:#fff;color:#173f31;padding:3px 7px;border-radius:999px}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 3px 14px rgba(0,0,0,.06)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat b{display:block;font-size:27px}.muted{color:#6b7e76}
.nav{display:flex;gap:8px;overflow:auto;margin-bottom:14px}.btn{border:0;border-radius:11px;padding:10px 13px;font-weight:800;cursor:pointer;white-space:nowrap}
.primary{background:#173f31;color:#fff}.secondary{background:#e6efeb;color:#173f31}.danger{background:#fee7e7;color:#8b1e1e}
.row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.field{margin-bottom:12px}.field label{display:block;font-weight:800;margin-bottom:6px}
input,select,textarea{width:100%;border:1px solid #cdd9d4;border-radius:11px;padding:11px;background:#fff}textarea{min-height:80px}
.login{min-height:100vh;display:grid;place-items:center;padding:20px}.login .card{width:min(430px,100%)}
table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:9px;border-bottom:1px solid #e7ece9;font-size:14px}
.msg{padding:10px;border-radius:10px;margin-bottom:10px}.error{background:#fee7e7;color:#8b1e1e}.ok{background:#e3f6e9;color:#185b31}
.small{font-size:12px}.section-title{margin:18px 0 8px}
@media(max-width:720px){.grid{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}.hide-mobile{display:none}}
</style>
</head>
<body>
<section id="loginPage" class="login">
  <div class="card">
    <h1>IPQC Smart Factory</h1>
    <p class="muted">V2.1 記住登入版</p>
    <div id="loginMsg"></div>
    <div class="field"><label>Email</label><input id="email" type="email" autocomplete="username"></div>
    <div class="field"><label>密碼</label><input id="password" type="password" autocomplete="current-password"></div>
    <button id="loginBtn" class="btn primary" style="width:100%">登入</button>
  </div>
</section>

<section id="appPage" class="hidden">
<header><div class="head"><div><div class="brand">IPQC Smart Factory <span class="badge">V2.1 記住登入版</span></div><div id="userEmail" class="small"></div></div><button id="logoutBtn" class="btn secondary">登出</button></div></header>
<main class="wrap">
  <div class="nav">
    <button class="btn primary" data-page="dashboard">Dashboard</button>
    <button class="btn secondary" data-page="newInspection">新增巡檢</button>
    <button class="btn secondary" data-page="records">巡檢紀錄</button>
    <button class="btn secondary" data-page="reliability">信賴度</button>
    <button class="btn secondary" data-page="parts">料號管理</button>
    <button class="btn secondary" data-page="employees">人員管理</button>
  </div>

  <section id="dashboard" class="page">
    <div class="grid">
      <div class="card stat"><span class="muted">今日巡檢</span><b id="statTotal">0</b></div>
      <div class="card stat"><span class="muted">今日 NG</span><b id="statNg">0</b></div>
      <div class="card stat"><span class="muted">今日良率</span><b id="statYield">0%</b></div>
      <div class="card stat"><span class="muted">待信賴度</span><b id="statPending">0</b></div>
    </div>
    <div class="card"><h2>最近巡檢</h2><div id="recentTable"></div></div>
  </section>

  <section id="newInspection" class="page hidden">
    <div class="card">
      <h2>新增巡檢</h2><div id="formMsg"></div>
      <div class="row">
        <div class="field"><label>日期</label><input id="inspectionDate" type="date"></div>
        <div class="field"><label>時間</label><input id="inspectionTime" type="time"></div>
        <div class="field"><label>料號</label><input id="partNumber" list="partList" placeholder="輸入或搜尋料號"><datalist id="partList"></datalist></div>
        <div class="field"><label>機台</label><input id="machine"></div>
        <div class="field"><label>操作員</label><input id="operatorName" list="employeeList"></div>
        <div class="field"><label>巡檢員</label><input id="inspectorName" list="employeeList"></div>
        <div class="field"><label>品檢人員</label><input id="qualityInspectorName" list="employeeList"></div>
      </div>
      <datalist id="employeeList"></datalist>
      <h3 class="section-title">印刷 A</h3>
      <div class="row"><div class="field"><label>OK</label><input id="aOk" type="number" min="0" value="0"></div><div class="field"><label>NG</label><input id="aNg" type="number" min="0" value="0"></div></div>
      <h3 class="section-title">印刷 B</h3>
      <div class="row"><div class="field"><label>OK</label><input id="bOk" type="number" min="0" value="0"></div><div class="field"><label>NG</label><input id="bNg" type="number" min="0" value="0"></div></div>
      <h3 class="section-title">包裝</h3>
      <div class="row"><div class="field"><label>OK</label><input id="pOk" type="number" min="0" value="0"></div><div class="field"><label>NG</label><input id="pNg" type="number" min="0" value="0"></div></div>
      <div class="field"><label>NG 原因</label><input id="ngReason"></div>
      <div class="field"><label>備註</label><textarea id="notes"></textarea></div>
      <button id="saveInspectionBtn" class="btn primary">儲存巡檢</button>
    </div>
  </section>

  <section id="records" class="page hidden"><div class="card"><h2>巡檢紀錄</h2><div id="recordsTable"></div></div></section>

  <section id="reliability" class="page hidden">
    <div class="card">
      <h2>信賴度測試</h2><div id="relMsg"></div>
      <div class="row">
        <div class="field"><label>對應巡檢</label><select id="relInspection"></select></div>
        <div class="field"><label>測試人員</label><input id="relTester" list="employeeList"></div>
        <div class="field"><label>99% 酒精</label><select id="relAlcohol"><option value="pending">待測</option><option value="ok">OK</option><option value="ng">NG</option><option value="skip">Skip</option></select></div>
        <div class="field"><label>3M600</label><select id="relTape"><option value="pending">待測</option><option value="ok">OK</option><option value="ng">NG</option><option value="skip">Skip</option></select></div>
        <div class="field"><label>測試日期</label><input id="relDate" type="date"></div>
      </div>
      <div class="field"><label>備註</label><textarea id="relNotes"></textarea></div>
      <button id="saveReliabilityBtn" class="btn primary">儲存信賴度測試</button>
      <div id="reliabilityTable" style="margin-top:14px"></div>
    </div>
  </section>

  <section id="parts" class="page hidden"><div class="card"><h2>料號管理</h2>
    <div class="row"><div class="field"><label>料號</label><input id="newPartCode"></div><div class="field"><label>關鍵字</label><input id="newPartKeywords"></div></div>
    <button id="addPartBtn" class="btn primary">新增料號</button><div id="partsTable" style="margin-top:14px"></div>
  </div></section>

  <section id="employees" class="page hidden"><div class="card"><h2>人員管理</h2>
    <div class="row"><div class="field"><label>姓名</label><input id="newEmployeeName"></div><div class="field"><label>角色</label><select id="newEmployeeRole"><option value="operator">作業員</option><option value="inspector">巡檢員</option><option value="quality">品檢</option><option value="manager">主管</option><option value="owner">老闆</option></select></div></div>
    <button id="addEmployeeBtn" class="btn primary">新增人員</button><div id="employeesTable" style="margin-top:14px"></div>
  </div></section>
</main>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://huhenjkybvzkqczkvmkh.supabase.co";
const SUPABASE_KEY="sb_publishable_cFXdFQJi9cAiBDNXMcHEYw_yYKMKP5D";
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{
  auth:{
    persistSession:true,
    autoRefreshToken:true,
    detectSessionInUrl:true,
    storage:window.localStorage
  }
});
const $=id=>document.getElementById(id);
let inspections=[],parts=[],employees=[],reliability=[];

function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function n(v){return Number(v)||0}
function showMsg(el,text,type='error'){el.innerHTML=`<div class="msg ${type}">${esc(text)}</div>`}
function setDefaults(){const d=new Date();const iso=d.toISOString().slice(0,10);$('inspectionDate').value=iso;$('relDate').value=iso;$('inspectionTime').value=d.toTimeString().slice(0,5)}

$('loginBtn').onclick=async()=>{
  $('loginBtn').disabled=true;
  const {data,error}=await sb.auth.signInWithPassword({email:$('email').value.trim(),password:$('password').value});
  $('loginBtn').disabled=false;
  if(error)return showMsg($('loginMsg'),error.message);
  await enterApp(data.user);
};
$('logoutBtn').onclick=async()=>{await sb.auth.signOut();location.reload()};

document.querySelectorAll('.nav button').forEach(btn=>btn.onclick=()=>{
  document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));
  $(btn.dataset.page).classList.remove('hidden');
  document.querySelectorAll('.nav button').forEach(b=>b.className='btn secondary');
  btn.className='btn primary';
});

async function enterApp(user){
  $('loginPage').classList.add('hidden');$('appPage').classList.remove('hidden');$('userEmail').textContent=user.email||'';
  setDefaults();await loadAll();subscribeRealtime();
}

async function loadAll(){
  const [a,b,c,d]=await Promise.all([
    sb.from('inspections').select('*').order('created_at',{ascending:false}).limit(500),
    sb.from('part_numbers').select('*').eq('active',true).order('code'),
    sb.from('employees').select('*').eq('active',true).order('name'),
    sb.from('reliability_tests').select('*').order('created_at',{ascending:false})
  ]);
  const err=a.error||b.error||c.error||d.error;
  if(err){alert(err.message);return}
  inspections=a.data||[];parts=b.data||[];employees=c.data||[];reliability=d.data||[];
  renderAll();
}

function renderAll(){
  $('partList').innerHTML=parts.map(x=>`<option value="${esc(x.code)}">${esc(x.keywords||'')}</option>`).join('');
  $('employeeList').innerHTML=employees.map(x=>`<option value="${esc(x.name)}"></option>`).join('');
  const today=new Date().toISOString().slice(0,10);
  const rows=inspections.filter(x=>x.inspection_date===today);
  let ok=0,ng=0;
  rows.forEach(x=>{ok+=n(x.printing_a_ok)+n(x.printing_b_ok)+n(x.packing_ok);ng+=n(x.printing_a_ng)+n(x.printing_b_ng)+n(x.packing_ng)});
  $('statTotal').textContent=rows.length;$('statNg').textContent=ng;$('statYield').textContent=(ok+ng?ok/(ok+ng)*100:0).toFixed(1)+'%';
  $('statPending').textContent=reliability.filter(x=>x.alcohol_result==='pending'||x.tape_3m600_result==='pending').length;
  $('recentTable').innerHTML=inspectionTable(inspections.slice(0,8));$('recordsTable').innerHTML=inspectionTable(inspections);
  $('partsTable').innerHTML=`<table><tr><th>料號</th><th>關鍵字</th></tr>${parts.map(x=>`<tr><td>${esc(x.code)}</td><td>${esc(x.keywords||'')}</td></tr>`).join('')}</table>`;
  $('employeesTable').innerHTML=`<table><tr><th>姓名</th><th>角色</th></tr>${employees.map(x=>`<tr><td>${esc(x.name)}</td><td>${esc(x.role)}</td></tr>`).join('')}</table>`;
  $('relInspection').innerHTML='<option value="">請選擇</option>'+inspections.map(x=>`<option value="${esc(x.id)}">${esc(x.inspection_date)} ${esc((x.inspection_time||'').slice(0,5))}｜${esc(x.part_number_code)}</option>`).join('');
  $('reliabilityTable').innerHTML=`<table><tr><th>料號</th><th>酒精</th><th>3M600</th><th>測試人員</th></tr>${reliability.map(x=>`<tr><td>${esc(x.part_number_code)}</td><td>${esc(x.alcohol_result)}</td><td>${esc(x.tape_3m600_result)}</td><td>${esc(x.tester_name||'')}</td></tr>`).join('')}</table>`;
}
function inspectionTable(rows){
  return `<table><tr><th>日期時間</th><th>料號</th><th>OK</th><th>NG</th><th class="hide-mobile">品檢</th></tr>${rows.map(x=>{const ok=n(x.printing_a_ok)+n(x.printing_b_ok)+n(x.packing_ok),ng=n(x.printing_a_ng)+n(x.printing_b_ng)+n(x.packing_ng);return `<tr><td>${esc(x.inspection_date)} ${esc((x.inspection_time||'').slice(0,5))}</td><td>${esc(x.part_number_code)}</td><td>${ok}</td><td>${ng}</td><td class="hide-mobile">${esc(x.quality_inspector_name||'')}</td></tr>`}).join('')}</table>`;
}

$('saveInspectionBtn').onclick=async()=>{
  const part=$('partNumber').value.trim();if(!part)return showMsg($('formMsg'),'請輸入料號');
  const payload={
    inspection_date:$('inspectionDate').value,inspection_time:$('inspectionTime').value,part_number_code:part,
    operator_name:$('operatorName').value.trim(),inspector_name:$('inspectorName').value.trim(),quality_inspector_name:$('qualityInspectorName').value.trim(),machine:$('machine').value.trim(),
    printing_a_status:'check',printing_a_ok:n($('aOk').value),printing_a_ng:n($('aNg').value),
    printing_b_status:'check',printing_b_ok:n($('bOk').value),printing_b_ng:n($('bNg').value),
    packing_status:'check',packing_ok:n($('pOk').value),packing_ng:n($('pNg').value),
    ng_reason:$('ngReason').value.trim(),notes:$('notes').value.trim()
  };
  const {error}=await sb.from('inspections').insert(payload);
  if(error)return showMsg($('formMsg'),error.message);
  showMsg($('formMsg'),'巡檢已儲存到雲端','ok');await loadAll();
};

$('addPartBtn').onclick=async()=>{
  const code=$('newPartCode').value.trim();if(!code)return;
  const {error}=await sb.from('part_numbers').insert({code,keywords:$('newPartKeywords').value.trim()});
  if(error)return alert(error.message);
  $('newPartCode').value='';$('newPartKeywords').value='';await loadAll();
};

$('addEmployeeBtn').onclick=async()=>{
  const name=$('newEmployeeName').value.trim();if(!name)return;
  const {error}=await sb.from('employees').insert({name,role:$('newEmployeeRole').value});
  if(error)return alert(error.message);
  $('newEmployeeName').value='';await loadAll();
};

$('saveReliabilityBtn').onclick=async()=>{
  const inspectionId=$('relInspection').value;
  if(!inspectionId)return showMsg($('relMsg'),'請先選擇巡檢紀錄');
  const row=inspections.find(x=>x.id===inspectionId);
  const payload={inspection_id:inspectionId,part_number_code:row?.part_number_code||'',alcohol_result:$('relAlcohol').value,tape_3m600_result:$('relTape').value,tester_name:$('relTester').value.trim(),test_date:$('relDate').value||null,notes:$('relNotes').value.trim()};
  const {error}=await sb.from('reliability_tests').insert(payload);
  if(error)return showMsg($('relMsg'),error.message);
  showMsg($('relMsg'),'信賴度測試已儲存','ok');await loadAll();
};

let subscribed=false;
function subscribeRealtime(){
  if(subscribed)return;subscribed=true;
  sb.channel('ipqc-v20').on('postgres_changes',{event:'*',schema:'public',table:'inspections'},loadAll)
    .on('postgres_changes',{event:'*',schema:'public',table:'part_numbers'},loadAll)
    .on('postgres_changes',{event:'*',schema:'public',table:'employees'},loadAll)
    .on('postgres_changes',{event:'*',schema:'public',table:'reliability_tests'},loadAll).subscribe();
}
(async()=>{const {data}=await sb.auth.getSession();if(data.session)await enterApp(data.session.user)})();
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
